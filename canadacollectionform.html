<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Canada Collection — Shia Deal</title>
    <link rel="icon" type="image/jpeg" href="qdlogo.jpg">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        body {
            position: fixed;
            inset: 0;
        }
        #typeform-host {
            position: absolute;
            inset: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh; /* dynamic viewport for mobile browsers with collapsing chrome */
        }
        #typeform-host > div[data-tf-live] {
            width: 100% !important;
            height: 100% !important;
        }
        #typeform-host iframe {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
            display: block;
        }
        .back-fab {
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 10;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.92);
            color: #3B2417;
            font-family: 'Poppins', sans-serif, system-ui;
            font-size: 0.82rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 999px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.18);
            backdrop-filter: blur(8px);
            transition: transform 0.15s ease, background 0.15s ease;
        }
        .back-fab:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 1);
        }
        @media (prefers-color-scheme: dark) {
            .back-fab {
                background: rgba(36, 24, 21, 0.92);
                color: #F0E6DC;
            }
            .back-fab:hover {
                background: rgba(36, 24, 21, 1);
            }
        }
    </style>
</head>
<body>
    <a href="shiadeal.html" class="back-fab" aria-label="Back to Shia Deal">← Back</a>
    <div id="typeform-host">
        <div data-tf-live="01KQS6W9DBDRPZNCE16QT50DMY"></div>
    </div>
    <script src="//embed.typeform.com/next/embed.js"></script>
</body>
</html>
