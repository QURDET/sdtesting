<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>(function(){var s=localStorage.getItem('qdTheme');if(s==='dark'||(s===null&&window.matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.setAttribute('data-theme','dark');}());</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canada Collection — Shia Deal</title>
    <link rel="icon" type="image/jpeg" href="qdlogo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FAF6F1;
            --card: #ffffff;
            --gold: #C9A84C;
            --gold2: #E8BB5C;
            --text: #3B2417;
            --text2: #5C4033;
            --text3: #9B7B6E;
            --border: #E8D5C4;
        }
        [data-theme="dark"] {
            --bg: #1A1210;
            --card: #241815;
            --text: #F0E6DC;
            --text2: #C9B5A8;
            --text3: #8A7068;
            --border: #3D2E28;
            --gold: #c47f0a;
            --gold2: #c98a10;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            width: 100%;
            padding: 20px 5%;
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--card);
            border-bottom: 1.5px solid var(--border);
        }
        .header img {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }
        .header span {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--text);
        }
        .header a {
            margin-left: auto;
            color: var(--gold);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .header a:hover { text-decoration: underline; }
        .form-container {
            width: 100%;
            max-width: 800px;
            flex: 1;
            padding: 32px 20px;
            min-height: 600px;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="qdlogo.jpg" alt="Qur'an Detectives">
        <span>Shia Deal — Canada</span>
        <a href="shiadeal.html">← Back to Shia Deal</a>
    </div>
    <div class="form-container">
        <div data-tf-live="01KQS6W9DBDRPZNCE16QT50DMY"></div>
        <script src="//embed.typeform.com/next/embed.js"></script>
    </div>
</body>
</html>
