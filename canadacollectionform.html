<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>(function(){var s=localStorage.getItem('qdTheme');if(s==='dark'||(s===null&&window.matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.setAttribute('data-theme','dark');}());</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Canada Collection — Shia Deal</title>
    <link rel="icon" type="image/jpeg" href="qdlogo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FAF6F1;
            --card: #ffffff;
            --gold: #C9A84C;
            --text: #3B2417;
            --border: #E8D5C4;
            --header-h: 56px;
        }
        [data-theme="dark"] {
            --bg: #1A1210;
            --card: #241815;
            --text: #F0E6DC;
            --border: #3D2E28;
            --gold: #c47f0a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
        }
        body {
            font-family: 'Poppins', sans-serif;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-h);
            padding: 0 5%;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--card);
            border-bottom: 1.5px solid var(--border);
            z-index: 10;
        }
        .header img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }
        .header span {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            color: var(--text);
        }
        .header a {
            margin-left: auto;
            color: var(--gold);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .header a:hover { text-decoration: underline; }
        #form-iframe {
            position: fixed;
            top: var(--header-h);
            left: 0;
            right: 0;
            bottom: 0;
            width: 100vw;
            height: calc(100vh - var(--header-h));
            height: calc(100dvh - var(--header-h));
            border: 0;
            display: block;
            background: var(--bg);
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="qdlogo.jpg" alt="Qur'an Detectives">
        <span>Shia Deal — Canada</span>
        <a href="shiadeal.html">← Back to Shia Deal</a>
    </div>
    <iframe
        id="form-iframe"
        src="https://form.typeform.com/to/01KQS6W9DBDRPZNCE16QT50DMY"
        title="Canada Shia Deal Purchase Form"
        allow="camera; microphone; autoplay; encrypted-media;"
        loading="lazy"
        referrerpolicy="strict-origin-when-cross-origin">
    </iframe>
</body>
</html>
