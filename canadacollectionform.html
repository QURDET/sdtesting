<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>(function(){var s=localStorage.getItem('qdTheme');if(s==='dark'||(s===null&&window.matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.setAttribute('data-theme','dark');}());</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Canada Collection — Shia Deal</title>
    <link rel="icon" type="image/jpeg" href="qdlogo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FAF6F1;
            --card: #ffffff;
            --gold: #C9A84C;
            --text: #3B2417;
            --border: #E8D5C4;
            --header-h: 56px;
        }
        [data-theme="dark"] {
            --bg: #1A1210;
            --card: #241815;
            --text: #F0E6DC;
            --border: #3D2E28;
            --gold: #c47f0a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
        }
        body {
            font-family: 'Poppins', sans-serif;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-h);
            padding: 0 5%;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--card);
            border-bottom: 1.5px solid var(--border);
            z-index: 10;
        }
        .header img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }
        .header span {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            color: var(--text);
        }
        .header a {
            margin-left: auto;
            color: var(--gold);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .header a:hover { text-decoration: underline; }
        #form-host {
            position: fixed;
            top: var(--header-h);
            left: 0;
            right: 0;
            bottom: 0;
            width: 100vw;
            height: calc(100vh - var(--header-h));
            height: calc(100dvh - var(--header-h));
            overflow: hidden;
        }
        /* Force every descendant of the host to fill 100% — covers any wrapper div Typeform inserts */
        #form-host,
        #form-host *,
        #form-host > *,
        #form-host > * > *,
        #form-host > * > * > *,
        #form-host iframe,
        #form-host div[data-tf-live] {
            width: 100% !important;
            height: 100% !important;
            min-height: 100% !important;
        }
        #form-host iframe {
            border: 0 !important;
            display: block !important;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="qdlogo.jpg" alt="Qur'an Detectives">
        <span>Shia Deal — Canada</span>
        <a href="shiadeal.html">← Back to Shia Deal</a>
    </div>
    <div id="form-host">
        <div data-tf-live="01KQS6W9DBDRPZNCE16QT50DMY"></div>
    </div>
    <script src="//embed.typeform.com/next/embed.js"></script>
    <script>
        // Aggressively force every descendant of the host to fill 100% width/height
        (function() {
            var host = document.getElementById('form-host');
            function fill() {
                var all = host.querySelectorAll('*');
                all.forEach(function(el) {
                    el.style.setProperty('width', '100%', 'important');
                    el.style.setProperty('height', '100%', 'important');
                    el.style.setProperty('min-height', '100%', 'important');
                    el.style.setProperty('max-height', 'none', 'important');
                    if (el.tagName === 'IFRAME') {
                        el.style.setProperty('border', '0', 'important');
                        el.style.setProperty('display', 'block', 'important');
                        el.removeAttribute('height');
                        el.removeAttribute('width');
                    }
                });
            }
            new MutationObserver(fill).observe(host, { childList: true, subtree: true, attributes: true });
            window.addEventListener('resize', fill);
            window.addEventListener('load', fill);
            // poll for the first ~10 seconds while Typeform's script settles
            var tries = 0;
            var iv = setInterval(function() {
                fill();
                if (++tries > 50) clearInterval(iv);
            }, 200);
        })();
    </script>
</body>
</html>
