<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>(function(){var s=localStorage.getItem('qdTheme');if(s==='dark'||(s===null&&window.matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.setAttribute('data-theme','dark');}());</script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qur'an Detectives</title>

    <!-- SEO meta tags: description and keywords help search engines find the page -->
    <meta name="description" content="Qur'an Detectives - Educational Qur'an sessions and creators of the Shia Deal card game. Where faith and fun meet!">
    <meta name="keywords" content="Qur'an Detectives, Shia Deal, Islamic card game, Qur'an sessions, Muslim children, Islamic education, Shia card game">

    <!-- Open Graph tags: control how the page looks when shared on social media -->
    <meta property="og:title" content="Qur'an Detectives">
    <meta property="og:description" content="Educational Qur'an sessions and creators of the Shia Deal card game. Where faith and fun meet!">
    <meta property="og:image" content="qdlogo.jpg">
    <meta property="og:type" content="website">

    <!-- Browser tab icon -->
    <link rel="icon" type="image/jpeg" href="qdlogo.jpg">

    <!-- Google Fonts: Nunito (headings), Poppins (body text), Bubblegum Sans (fun callout) -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Poppins:wght@300;400;500;600&family=Bubblegum+Sans&display=swap" rel="stylesheet">

    <style>
        /* ── Reset: remove default browser margin/padding on all elements ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ── Base body: warm off-white background, dark brown text ── */
        body {
            font-family: 'Poppins', sans-serif;
            background: #FAF6F1;
            color: #3B2417;
            min-height: 100vh;
        }

        /* ── Navigation: fixed to top so it stays visible while scrolling ── */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 0.8rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ffffff;
            backdrop-filter: blur(10px);
            z-index: 1000; /* sits above all other content */
            box-shadow: 0 2px 15px rgba(59, 36, 23, 0.1);
        }

        /* ── Nav brand: logo image + site name side by side ── */
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-brand img {
            height: 50px;
            width: 50px;
            object-fit: cover;
            border-radius: 50%;
        }

        .nav-brand span {
            font-family: 'Nunito', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            color: #3B2417;
        }

        /* ── Nav links: horizontal list of page links ── */
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            font-family: 'Nunito', sans-serif;
            color: #5C4033;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
            font-size: 0.95rem;
        }

        /* Highlight link on hover */
        .nav-links a:hover {
            color: #7B3F5E;
        }

        /* ── Hamburger button: hidden on desktop, shown on mobile ── */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px;
        }

        /* Three lines that make up the hamburger icon */
        .hamburger span {
            display: block;
            width: 26px;
            height: 3px;
            background: #3B2417;
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        /* Animate the three lines into an X when menu is open */
        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 6px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0; /* hide middle line */
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -6px);
        }

        /* ── Hero section: full-screen landing area with gradient background ── */
        .hero {
            background: linear-gradient(135deg, #F5E8D6 0%, #EFE0CE 40%, #E8D5C4 100%);
            padding: 160px 5% 100px;
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
        }

        /* Subtle radial gradient overlays for depth, placed behind content */
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 80%, rgba(123, 63, 94, 0.06) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(107, 123, 141, 0.06) 0%, transparent 50%);
        }

        /* Content wrapper sits above the ::before gradient overlay */
        .hero .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        /* Circular logo image with border and shadow */
        .hero > .content > img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #ffffff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        /* Main heading */
        .hero h1 {
            font-family: 'Nunito', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            color: #3B2417;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* ── Image button: clicking the Shia Deal image navigates to that page ── */
        .btn-image {
            display: inline-block;
            transition: all 0.3s ease;
        }

        .btn-image img {
            width: 220px;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
        }

        /* Lift effect on hover */
        .btn-image:hover {
            transform: translateY(-4px);
        }

        .btn-image:hover img {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
        }

        /* ── Fun callout: arrow + text pointing up at the Shia Deal button ── */
        .fun-callout {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .fun-callout .text {
            font-family: 'Bubblegum Sans', cursive;
            font-size: 1.4rem;
            color: #E8872A;
            transform: rotate(-3deg); /* slight tilt for a handwritten feel */
        }

        .fun-callout .arrow {
            font-size: 1.8rem;
            color: #E8872A;
            line-height: 1;
            margin-top: -15px; /* pull arrow closer to the text above */
        }

        /* ── Footer: simple copyright bar at the bottom ── */
        footer {
            text-align: center;
            padding: 30px 20px;
            background: #ffffff;
            color: #6B5B4F;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* ── Mobile responsive overrides (screens 768px and below) ── */
        @media (max-width: 768px) {
            /* Convert nav links into a slide-in side panel */
            .nav-links {
                display: none;
                position: fixed;
                top: 0;
                right: 0;
                width: 260px;
                height: 100vh;
                background: #ffffff;
                flex-direction: column;
                padding: 80px 30px 30px;
                gap: 1.5rem;
                box-shadow: -5px 0 20px rgba(0, 0, 0, 0.1);
                z-index: 999;
            }

            /* Show the side panel when the hamburger is toggled */
            .nav-links.active {
                display: flex;
            }

            /* Show the hamburger button on mobile */
            .hamburger {
                display: flex;
                z-index: 1001;
            }

            /* Scale down heading and images for smaller screens */
            .hero h1 {
                font-size: 2rem;
                letter-spacing: 1px;
            }

            .hero > .content > img {
                width: 90px;
                height: 90px;
            }

            .btn-image img {
                width: 160px;
            }

            .fun-callout .text {
                font-size: 1.1rem;
            }

            .fun-callout .arrow {
                font-size: 1.4rem;
            }
        }

        /* ── Theme toggle ── */
        .theme-toggle { background: none; border: none; cursor: pointer; font-size: 1.2rem; line-height: 1; padding: 2px 6px; border-radius: 6px; flex-shrink: 0; }
        .theme-toggle:hover { opacity: 0.7; }

        /* ── Dark mode ── */
        [data-theme="dark"] body { background: #1a1310; color: #EFE0CE; }
        [data-theme="dark"] nav { background: #241b14; box-shadow: 0 2px 15px rgba(0,0,0,0.5); }
        [data-theme="dark"] .nav-brand span { color: #EFE0CE; }
        [data-theme="dark"] .nav-links { background: #241b14; }
        [data-theme="dark"] .nav-links a { color: #C8A882; }
        [data-theme="dark"] .nav-links a:hover { color: #D4899E; }
        [data-theme="dark"] .hamburger span { background: #EFE0CE; }
        [data-theme="dark"] .hero { background: linear-gradient(135deg, #2a1f16 0%, #201610 40%, #1a1310 100%); }
        [data-theme="dark"] .hero h1 { color: #EFE0CE; }
        [data-theme="dark"] footer { background: #241b14; color: #9E8071; }
    </style>
</head>
<body>

    <!-- ── Navigation bar: logo on left, links on right, hamburger for mobile ── -->
    <nav>
        <div class="nav-brand">
            <img src="qdlogo.jpg" alt="Qur'an Detectives Logo">
            <span>Qur'an Detectives</span>
        </div>
        <!-- Hamburger button: only visible on mobile, triggers toggleMenu() -->
        <button class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <ul class="nav-links" id="navLinks">
            <li><a href="shiadeal.html">Shia Deal</a></li>
            <li><a href="contactus.html">Contact</a></li>
            <li><button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">🌙</button></li>
        </ul>
    </nav>

    <!-- ── Hero section: main landing content with logo, title and Shia Deal button ── -->
    <section class="hero">
        <div class="content">
            <!-- Circular logo -->
            <img src="qdlogo.jpg" alt="Qur'an Detectives Logo">
            <h1>Qur'an Detectives</h1>

            <!-- Clicking the Shia Deal logo takes the user to the Shia Deal page -->
            <a href="shiadeal.html" class="btn-image">
                <img src="SDlogo.jpeg" alt="Shia Deal">
            </a>

            <!-- Fun arrow callout encouraging the user to click the button above -->
            <div class="fun-callout">
                <span class="arrow">&#8593;</span>
                <span class="text">Press here for something cool!</span>
            </div>
        </div>
    </section>

    <!-- ── Footer: copyright notice ── -->
    <footer>
        <p>&copy; 2026 Qur'an Detectives. All rights reserved.</p>
        <a href="admin.html" style="display:inline-block;margin-top:12px;padding:7px 18px;background:#3B2417;color:#fff;border-radius:8px;font-family:'Poppins',sans-serif;font-size:0.8rem;font-weight:600;text-decoration:none;opacity:0.7;transition:opacity 0.2s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7">Staff</a>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('active');
            document.querySelector('.hamburger').classList.toggle('active');
        }
        function toggleTheme() {
            var d = document.documentElement.getAttribute('data-theme') === 'dark';
            if (d) { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('qdTheme', 'light'); }
            else   { document.documentElement.setAttribute('data-theme', 'dark'); localStorage.setItem('qdTheme', 'dark'); }
            updateThemeBtn();
        }
        function updateThemeBtn() {
            var b = document.getElementById('theme-toggle');
            if (b) b.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
        }
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
            if (!localStorage.getItem('qdTheme')) {
                if (e.matches) document.documentElement.setAttribute('data-theme', 'dark');
                else document.documentElement.removeAttribute('data-theme');
                updateThemeBtn();
            }
        });
        document.addEventListener('DOMContentLoaded', updateThemeBtn);
    </script>

</body>
</html>
